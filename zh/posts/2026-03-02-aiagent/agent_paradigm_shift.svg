<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="400" fill="#ffffff" />
  
  <!-- 分割线 -->
  <line x1="400" y1="50" x2="400" y2="380" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5" />

  <!-- 左侧：旧范式 -->
  <g transform="translate(50, 20)">
    <text x="150" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#7f8c8d">旧范式: Prompt Engineering</text>
    <text x="150" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#95a5a6">(人工静态编排)</text>
    
    <!-- 用户 -->
    <circle cx="150" cy="120" r="30" fill="#ffe0b2" stroke="#ff9800" stroke-width="2"/>
    <text x="150" y="125" text-anchor="middle" font-size="12">人类</text>

    <!-- 简单直线 -->
    <line x1="150" y1="160" x2="150" y2="220" stroke="#333" stroke-width="2" />
    <text x="160" y="190" font-size="12" fill="#555">手动塞入所有背景</text>

    <!-- Context Box (Full) -->
    <rect x="50" y="230" width="200" height="120" fill="#eee" stroke="#999" stroke-width="2"/>
    <text x="150" y="250" text-anchor="middle" font-size="14" font-weight="bold">Context (拥挤)</text>
    <rect x="60" y="260" width="180" height="10" fill="#bdbdbd"/>
    <rect x="60" y="275" width="180" height="10" fill="#bdbdbd"/>
    <rect x="60" y="290" width="180" height="10" fill="#bdbdbd"/>
    <rect x="60" y="305" width="180" height="10" fill="#e57373"/> <!-- 溢出 -->
    <text x="150" y="340" text-anchor="middle" font-size="12" fill="#c0392b">容易丢失重点 / 溢出</text>
  </g>

  <!-- 右侧：新范式 -->
  <g transform="translate(450, 20)">
    <text x="150" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#2980b9">新范式: Autonomous Agent</text>
    <text x="150" y="55" font-family="Arial" font-size="14" text-anchor="middle" fill="#3498db">(自主内存调度)</text>

    <!-- Agent Brain -->
    <rect x="100" y="100" width="100" height="60" rx="10" fill="#e1f5fe" stroke="#039be5" stroke-width="2"/>
    <text x="150" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#0277bd">Agent</text>

    <!-- 循环直线 -->
    <path d="M150 170 L150 200" stroke="#333" stroke-width="2" />

    <!-- Context Box (Clean) -->
    <rect x="50" y="230" width="200" height="120" fill="#f9fbe7" stroke="#cddc39" stroke-width="2"/>
    <text x="150" y="250" text-anchor="middle" font-size="14" font-weight="bold">Context (动态)</text>
    
    <!-- 动态块 -->
    <rect x="70" y="270" width="160" height="20" rx="4" fill="#81c784"/>
    <text x="150" y="285" text-anchor="middle" font-size="12" fill="white">当前需要的代码块 A</text>
    
    <!-- 外部文件 -->
    <rect x="280" y="250" width="40" height="50" fill="#cfd8dc" stroke="#607d8b"/>
    <rect x="285" y="255" width="30" height="5" fill="#fff"/>
    <text x="300" y="320" text-anchor="middle" font-size="10">硬盘文件</text>

    <!-- 交换操作 -->
    <path d="M260 270 L240 270" stroke="#0277bd" stroke-width="2" />
    <text x="270" y="240" font-size="11" fill="#0277bd">Load</text>
    <path d="M240 290 L260 290" stroke="#0277bd" stroke-width="2" />
    
  </g>

  <!-- 移除箭头定义 -->
</svg>